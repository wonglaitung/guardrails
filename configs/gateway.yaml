# LLM Guard Gateway 配置文件

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080
  workers: 1  # 开发环境使用1，生产环境可适当增加

# 日志配置
logging:
  level: "info"  # debug, info, warning, error
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 模型配置
# 支持多个模型，通过模型名称选择
models:
  # OpenAI GPT-4 系列
  gpt-4:
    name: "gpt-4"
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  gpt-4-turbo:
    name: "gpt-4-turbo"
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  gpt-4o:
    name: "gpt-4o"
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  gpt-4o-mini:
    name: "gpt-4o-mini"
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  # OpenAI GPT-3.5 系列
  gpt-3.5-turbo:
    name: "gpt-3.5-turbo"
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  # Claude 3 系列
  claude-3-opus:
    name: "claude-3-opus"
    base_url: "https://api.anthropic.com/v1"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout: 60.0
    api_type: "claude"

  claude-3-sonnet:
    name: "claude-3-sonnet"
    base_url: "https://api.anthropic.com/v1"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout: 60.0
    api_type: "claude"

  claude-3-haiku:
    name: "claude-3-haiku"
    base_url: "https://api.anthropic.com/v1"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout: 60.0
    api_type: "claude"

  # Azure OpenAI 配置
  azure:
    name: "Azure OpenAI"
    base_url: "${AZURE_OPENAI_ENDPOINT}"
    api_key: "${AZURE_OPENAI_KEY}"
    timeout: 60.0
    api_type: "openai"

  # 智谱 AI (GLM)
  glm-4.7:
    name: "glm-4.7"
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    api_key: "${GLM_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  # 阿里云 (通义千问)
  qwen3.5:
    name: "qwen3.5"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  # 百度千帆（需要自定义 Host）
  qianfan:
    name: "qianfan"
    base_url: "https://qianfan.baidubce.com/v2"
    api_key: "${QIANFAN_API_KEY}"
    timeout: 60.0
    api_type: "openai"
    custom_headers:
      Host: "qianfan.baidubce.com"

  # 火山引擎 GLM-4.7
  glm-4.7:
    name: "glm-4.7"
    base_url: "https://ark.cn-beijing.volces.com/api/coding/v3"
    api_key: "${VOLCES_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  # Moonshot AI
  moonshot:
    name: "moonshot"
    base_url: "https://api.moonshot.cn/v1"
    api_key: "${MOONSHOT_API_KEY}"
    timeout: 60.0
    api_type: "openai"

  # 本地 Ollama
  ollama:
    name: "Local Ollama"
    base_url: "http://localhost:11434/v1"
    timeout: 120.0
    api_type: "openai"

  # 默认模型配置
  default:
    name: "Default"
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    timeout: 60.0
    api_type: "openai"

# 认证配置
# mode: config|client|both
#   - config: 只用配置文件的 api_key，客户端不需要提供 Authorization
#   - client: 只用客户端提供的 Authorization，配置文件中的 api_key 被忽略
#   - both: 优先用配置文件的，如果没有设置则用客户端的（默认）
auth:
  mode: "both"

# 内容过滤配置
filter:
  enabled: true
  min_score: 0.5  # PII检测置信度阈值 (0-1)
  action: "redact"  # redact(脱敏) | block(阻断) | log(仅记录)
  filter_response: false  # 是否对LLM响应进行PII过滤（默认false，只保护用户输入）

  # 白名单：这些路径不进行PII检查
  whitelist_paths:
    - "/health"
    - "/metrics"
    - "/v1/models"

# Judge 配置（Layer 2 实时裁判）
# 使用 Qwen3Guard-8B-Stream 进行内容安全检测
judge:
  enabled: false  # 设为 true 启用 Judge
  endpoint: "http://localhost:8001/v1/chat/completions"  # Qwen3Guard-8B-Stream 服务地址
  model: "Qwen3Guard-8B-Stream"
  timeout: 5.0  # Judge 请求超时时间（秒）
  confidence_threshold: 0.7  # 置信度阈值，低于此值触发深度审计
  timeout_action: "pass"  # 超时策略：pass（放行）| block（阻断）

  # 流式拦截配置
  stream_intercept:
    enabled: true  # 是否启用流式拦截
    check_interval: 5  # 每 N 个 token 检测一次
    safety_threshold: 0.3  # 安全分数阈值（0-1），低于此值触发熔断
    min_tokens_before_check: 10  # 开始检测前的最小 token 数

# 安全提示：
# 1. 不要在配置文件中直接填写API Key，使用环境变量
# 2. 确保配置文件的权限设置为 600 (仅限所有者读写)
# 3. 生产环境建议使用专门的密钥管理服务
# 4. Judge 服务建议独立部署，与 Gateway 解耦
